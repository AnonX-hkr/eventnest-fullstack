services:
  - type: web
    name: eventnest-api
    runtime: node
    region: oregon
    plan: free

    # ─── Build & start ────────────────────────────────────────────────────────
    buildCommand: npm install
    startCommand: node index.js

    # ─── Health check ─────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ─── Environment variables ────────────────────────────────────────────────
    # Set SECRET values in the Render dashboard (not here).
    # Values listed here are non-sensitive defaults that can be committed.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"

      # MongoDB Atlas connection string — set in Render dashboard
      - key: MONGO_URI
        sync: false

      # JWT secrets — set in Render dashboard (generate with openssl rand -hex 64)
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # Frontend origin — update to your Vercel domain after first deploy
      - key: CLIENT_URL
        value: https://eventnest.vercel.app
      - key: FRONTEND_URL
        value: https://eventnest.vercel.app

      # Stripe — set in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # SMTP — leave blank to use Ethereal (auto-created in dev, logs preview URL)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "EventNest <tickets@eventnest.dev>"

      # Rate limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
