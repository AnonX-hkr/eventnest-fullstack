  <!-- Left twig -->
  <path d="M7 20 Q9 16 12 17" stroke="#0c2230" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right twig -->
  <path d="M25 20 Q23 16 20 17" stroke="#0c2230" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Ticket/event diamond center -->
  <path d="M16 8 L20.5 14 L16 17 L11.5 14 Z" fill="#0c2230"/>
  <!-- Ticket notch left -->
  <circle cx="11.5" cy="14" r="1.3" fill="#00d26a"/>
  <!-- Ticket notch right -->
  <circle cx="20.5" cy="14" r="1.3" fill="#00d26a"/>
